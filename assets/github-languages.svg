<svg width="460" height="195" viewBox="0 0 460 195" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">drx347 language statistics</title>
  <desc id="desc">Animated language card calculated from repository file sizes.</desc>
  <style>
    .title { fill: #02731B; font: 700 18px Segoe UI, Ubuntu, Sans-Serif; }
    .subtitle { fill: #57606a; font: 500 12px Segoe UI, Ubuntu, Sans-Serif; }
    .label { fill: #24292f; font: 600 13px Segoe UI, Ubuntu, Sans-Serif; }
    .value { fill: #02731B; font: 700 22px Segoe UI, Ubuntu, Sans-Serif; }
    .small { fill: #57606a; font: 600 12px Segoe UI, Ubuntu, Sans-Serif; }
    .bar-value { fill: #57606a; font: 600 12px Segoe UI, Ubuntu, Sans-Serif; text-anchor: end; }
  </style>
  <rect x="0.5" y="0.5" width="459" height="194" rx="8" fill="#ffffff" stroke="#d0d7de" />
  <g id="loader">
    <rect x="24" y="25" width="180" height="18" rx="9" fill="#eaeef2" />
    <rect x="24" y="60" width="412" height="14" rx="7" fill="#eaeef2" />
    <rect x="24" y="92" width="368" height="14" rx="7" fill="#eaeef2" />
    <rect x="24" y="124" width="322" height="14" rx="7" fill="#eaeef2" />
    <rect x="-120" y="0" width="90" height="195" fill="#ffffff" opacity=".55">
      <animate attributeName="x" values="-120;540" dur="1.15s" repeatCount="2" />
    </rect>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;.72;1" dur="1.45s" fill="freeze" />
  </g>
  <g id="content" opacity="0" transform="translate(0 8)">
    <animate attributeName="opacity" values="0;1" begin=".95s" dur=".45s" fill="freeze" />
    <animateTransform attributeName="transform" type="translate" values="0 8;0 0" begin=".95s" dur=".45s" fill="freeze" />
    <text x="24" y="30" class="title">Most Used Languages</text>
    <text x="24" y="50" class="subtitle">calculated by file size - 2.1 MB total</text>
    
    <g transform="translate(24 66)">
      <circle cx="5" cy="7" r="4.5" fill="#02731B" />
      <text x="18" y="12" class="label">Lua</text>
      <rect x="150" y="1" width="150" height="11" rx="5.5" fill="#eaeef2" />
      <rect x="150" y="1" width="0" height="11" rx="5.5" fill="#02731B">
        <animate attributeName="width" values="0;41" begin="1.05s" dur=".7s" fill="freeze" />
      </rect>
      <text x="348" y="12" class="bar-value">27.6%</text>
    </g>
    <g transform="translate(24 86)">
      <circle cx="5" cy="7" r="4.5" fill="#663399" />
      <text x="18" y="12" class="label">CSS</text>
      <rect x="150" y="1" width="150" height="11" rx="5.5" fill="#eaeef2" />
      <rect x="150" y="1" width="0" height="11" rx="5.5" fill="#663399">
        <animate attributeName="width" values="0;31" begin="1.05s" dur=".7s" fill="freeze" />
      </rect>
      <text x="348" y="12" class="bar-value">20.4%</text>
    </g>
    <g transform="translate(24 106)">
      <circle cx="5" cy="7" r="4.5" fill="#3178c6" />
