      <rect x="150" y="1" width="150" height="11" rx="5.5" fill="#eaeef2" />
      <rect x="150" y="1" width="0" height="11" rx="5.5" fill="#3178c6">
        <animate attributeName="width" values="0;28" begin="1.05s" dur=".7s" fill="freeze" />
      </rect>
      <text x="348" y="12" class="bar-value">18.6%</text>
    </g>
    <g transform="translate(24 126)">
      <circle cx="5" cy="7" r="4.5" fill="#f1e05a" />
      <text x="18" y="12" class="label">JavaScript</text>
      <rect x="150" y="1" width="150" height="11" rx="5.5" fill="#eaeef2" />
      <rect x="150" y="1" width="0" height="11" rx="5.5" fill="#f1e05a">
        <animate attributeName="width" values="0;23" begin="1.05s" dur=".7s" fill="freeze" />
      </rect>
      <text x="348" y="12" class="bar-value">15.3%</text>
    </g>
    <g transform="translate(24 146)">
      <circle cx="5" cy="7" r="4.5" fill="#3572A5" />
      <text x="18" y="12" class="label">Python</text>
      <rect x="150" y="1" width="150" height="11" rx="5.5" fill="#eaeef2" />
      <rect x="150" y="1" width="0" height="11" rx="5.5" fill="#3572A5">
        <animate attributeName="width" values="0;21" begin="1.05s" dur=".7s" fill="freeze" />
      </rect>
      <text x="348" y="12" class="bar-value">13.7%</text>
    </g>
    <g transform="translate(24 166)">
      <circle cx="5" cy="7" r="4.5" fill="#8957e5" />
      <text x="18" y="12" class="label">Luau</text>
      <rect x="150" y="1" width="150" height="11" rx="5.5" fill="#eaeef2" />
      <rect x="150" y="1" width="0" height="11" rx="5.5" fill="#8957e5">
        <animate attributeName="width" values="0;4" begin="1.05s" dur=".7s" fill="freeze" />
      </rect>
      <text x="348" y="12" class="bar-value">1.7%</text>
    </g>

  </g>
</svg>
